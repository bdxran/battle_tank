name: Release

on:
  push:
    tags:
      - "v*"

env:
  GODOT_VERSION: "4.6.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Tests C#
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore & test
        run: |
          dotnet restore src/Tests/BattleTank.Tests.csproj
          dotnet test src/Tests/BattleTank.Tests.csproj --logger trx

  export:
    name: Export — ${{ matrix.preset }}
    needs: test
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:mono-4.6.2

    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: "Linux Server"
            artifact: server-linux
            output: server.x86_64
            archive: server-linux.tar.gz
            archive_cmd: tar czf

          - preset: "Linux"
            artifact: client-linux
            output: BattleTank.x86_64
            archive: client-linux.tar.gz
            archive_cmd: tar czf

          - preset: "Windows Desktop"
            artifact: client-windows
            output: BattleTank.exe
            archive: client-windows.zip
            archive_cmd: zip -r

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends libfontconfig1
          ldconfig

      - name: Install Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.2.stable.mono
          mv /root/.local/share/godot/export_templates/4.6.2.stable.mono/* \
             ~/.local/share/godot/export_templates/4.6.2.stable.mono/ 2>/dev/null || \
          mv /root/.local/share/godot/export_templates/4.6.2.stable/* \
             ~/.local/share/godot/export_templates/4.6.2.stable.mono/ 2>/dev/null || true

      - name: Restore NuGet packages
        run: dotnet restore BattleTank.sln

      - name: Build C# assemblies
        run: dotnet build BattleTank.sln --no-restore

      - name: Import project
        run: |
          godot --headless --path "$GITHUB_WORKSPACE" --import || true

      - name: Export — ${{ matrix.preset }}
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          godot --headless --path "$GITHUB_WORKSPACE" --export-release "${{ matrix.preset }}" \
            "$GITHUB_WORKSPACE/dist/${{ matrix.artifact }}/${{ matrix.output }}"

      - name: Copy C# managed assemblies
        run: |
          DLLS=$(find .godot/mono/temp/bin -name "*.dll" 2>/dev/null)
          if [ -n "$DLLS" ]; then
            find .godot/mono/temp/bin -name "*.dll" -exec cp {} dist/${{ matrix.artifact }}/ \;
          else
            find . -path "./.godot" -prune -o -name "*.dll" -print | xargs -I{} cp {} dist/${{ matrix.artifact }}/ 2>/dev/null || true
          fi
          ls -la dist/${{ matrix.artifact }}/

      - name: Add setup doc to server package
        if: matrix.artifact == 'server-linux'
        run: cp docs/server-setup.md dist/${{ matrix.artifact }}/SETUP.md

      - name: Add setup doc to client-linux package
        if: matrix.artifact == 'client-linux'
        run: cp docs/client-setup.md dist/${{ matrix.artifact }}/SETUP.md

      - name: Add setup doc to client-windows package
        if: matrix.artifact == 'client-windows'
        run: cp docs/client-setup.md dist/${{ matrix.artifact }}/SETUP.md

      - name: Package archive (tar.gz)
        if: endsWith(matrix.archive, '.tar.gz')
        run: |
          cd dist/${{ matrix.artifact }}
          tar czf ../../${{ matrix.archive }} .

      - name: Package archive (zip)
        if: endsWith(matrix.archive, '.zip')
        run: |
          cd dist/${{ matrix.artifact }}
          zip -r ../../${{ matrix.archive }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}

  installer-windows:
    name: Windows Installer (Inno Setup)
    needs: export
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup + IDP plugin
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $idpUrl = "https://github.com/ivankuznetsov/InnoDownloadPlugin/releases/latest/download/idp.zip"
          $idpDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          Invoke-WebRequest $idpUrl -OutFile "$env:TEMP\idp.zip"
          Expand-Archive "$env:TEMP\idp.zip" -DestinationPath "$env:TEMP\idp" -Force
          Copy-Item "$env:TEMP\idp\*" "C:\Program Files (x86)\Inno Setup 6\" -Recurse -Force

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" /DAppVersion=$version installer/windows/setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: Output/BattleTank-Setup.exe

  release:
    name: Create GitHub Release
    needs: [export, installer-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate changelog for release notes
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Battle Tank ${{ github.ref_name }}"
          body: |
            ## Nouveautés

            ${{ steps.changelog.outputs.NOTES }}

            ## Installation

            ### Windows
            1. Télécharger **`BattleTank-Setup.exe`**
            2. Lancer l'installeur et suivre l'assistant
            3. Le jeu s'installe dans `%LOCALAPPDATA%\BattleTank\`
            4. Un raccourci est créé sur le Bureau et dans le Menu Démarrer

            ### Linux
            ```bash
            # Installation automatique (télécharge cette release)
            curl -sSL https://raw.githubusercontent.com/randy/battle_tank/master/scripts/install-linux.sh | bash

            # Ou depuis l'archive téléchargée manuellement
            bash install-linux.sh client-linux.tar.gz
            ```
            Le jeu s'installe dans `~/.local/share/games/battle-tank/` et est accessible via la commande `battle-tank`.

            > Les préférences, keybindings et données de jeu sont sauvegardés dans `~/Documents/BattleTank/`.

            ## Téléchargements

            | Plateforme | Fichier | Notes |
            |------------|---------|-------|
            | Windows | `BattleTank-Setup.exe` | Installeur recommandé |
            | Windows (zip) | `client-windows.zip` | Archive brute |
            | Linux | `client-linux.tar.gz` | Via script `install-linux.sh` |
            | Serveur Linux | `server-linux.tar.gz` | Serveur dédié headless |

            ## Héberger une partie

            ```bash
            # Linux — démarrer un serveur dédié
            tar -xzf server-linux.tar.gz
            ./server.x86_64 --headless -- --server

            # Avec mot de passe admin
            ./server.x86_64 --headless -- --server --admin-password=monmotdepasse
            ```
            Les autres joueurs entrent l'adresse IP du serveur dans le client pour rejoindre.
          files: |
            artifacts/server-linux/server-linux.tar.gz
            artifacts/client-linux/client-linux.tar.gz
            artifacts/client-windows/client-windows.zip
            artifacts/installer-windows/BattleTank-Setup.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
